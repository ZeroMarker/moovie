default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  <% if ENV["DATABASE_URL"] && !ENV["DATABASE_URL"].empty? %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  <% end %>

development:
  <<: *default
  <% unless ENV["DATABASE_URL"] && !ENV["DATABASE_URL"].empty? %>
  database: moovie_development
  <% end %>

test:
  <<: *default
  <% unless ENV["DATABASE_URL"] && !ENV["DATABASE_URL"].empty? %>
  database: moovie_test
  <% end %>

production:
  <<: *default
  <% unless ENV["DATABASE_URL"] && !ENV["DATABASE_URL"].empty? %>
  database: <%= ENV.fetch("DATABASE_NAME", "moovie_production") %>
  <% end %>
